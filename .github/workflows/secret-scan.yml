name: Secret Scan

# CI backstop: catches secrets even if a developer skipped `pre-commit install`.
# Runs on every push and PR. Blocks merge if secrets are detected.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  gitleaks:
    name: Detect hardcoded secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch full history so gitleaks can diff the pushed commits,
          # not just the final state of the branch
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Scan only the commits in this push/PR, not the full repo history
          # (use 'detect' for a full historical scan — useful on first setup)
          args: protect --staged --config=.gitleaks.toml

  pre-commit:
    name: Pre-commit hook validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1
        # This runs the exact same hooks defined in .pre-commit-config.yaml
        # against the files changed in this PR/push
